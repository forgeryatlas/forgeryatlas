            <script src="lib/bindings/utils.js">
    var originalNodeColors = {};
    var originalEdgeColors = {};
    var originalNodeLabels = {};

    network.on("stabilizationIterationsDone", function () {
        network.setOptions( { physics: false } );
        
        // Cache original colors and labels after first render
        var allNodes = nodes.get();
        allNodes.forEach(function(node) {
            originalNodeColors[node.id] = node.color ? node.color : undefined;
            originalNodeLabels[node.id] = node.label !== undefined ? node.label : "";
        });
        
        var allEdges = edges.get();
        allEdges.forEach(function(edge) {
            originalEdgeColors[edge.id] = edge.color ? edge.color : undefined;
        });
    });

    network.on("selectNode", function (params) {
        var selectedNode = params.nodes[0];
        var connectedNodes = network.getConnectedNodes(selectedNode);
        var connectedEdges = network.getConnectedEdges(selectedNode);

        var allNodes = nodes.get();
        var allEdges = edges.get();

        var updateNodes = [];
        var updateEdges = [];

        // Dim all nodes except selected and its neighbors — hide their labels completely
        allNodes.forEach(function(node) {
            var isConnected = connectedNodes.includes(node.id) || node.id == selectedNode;
            if (isConnected) {
                updateNodes.push({
                    id: node.id,
                    color: originalNodeColors[node.id],
                    label: originalNodeLabels[node.id],
                    font: { color: "#3a332a" }
                });
            } else {
                updateNodes.push({
                    id: node.id,
                    color: "rgba(200,200,200,0.2)",
                    label: "",
                    font: { color: "rgba(0,0,0,0)" }
                });
            }
        });

        // Dim all edges except connected ones
        allEdges.forEach(function(edge) {
            var isConnectedEdge = connectedEdges.includes(edge.id);
            if (isConnectedEdge) {
                var restoredColor = originalEdgeColors[edge.id];
                updateEdges.push({ id: edge.id, color: restoredColor });
            } else {
                updateEdges.push({ id: edge.id, color: "rgba(200,200,200,0.1)" });
            }
        });

        nodes.update(updateNodes);
        edges.update(updateEdges);
    });

    network.on("deselectNode", function (params) {
        var allNodes = nodes.get();
        var allEdges = edges.get();
        
        var updateNodes = [];
        var updateEdges = [];

        allNodes.forEach(function(node) {
            updateNodes.push({
                id: node.id,
                color: originalNodeColors[node.id],
                label: originalNodeLabels[node.id],
                font: { color: "#3a332a" }
            });
        });
        allEdges.forEach(function(edge) {
            var restoredColor = originalEdgeColors[edge.id];
            updateEdges.push({ id: edge.id, color: restoredColor });
        });

        nodes.update(updateNodes);
        edges.update(updateEdges);
    });
    </script>

    var originalNodeColors = {};
    var originalEdgeColors = {};
    var originalNodeLabels = {};

    network.on("stabilizationIterationsDone", function () {
        network.setOptions( { physics: false } );
        
        // Cache original colors and labels after first render
        var allNodes = nodes.get();
        allNodes.forEach(function(node) {
            originalNodeColors[node.id] = node.color ? node.color : undefined;
            originalNodeLabels[node.id] = node.label !== undefined ? node.label : "";
        });
        
        var allEdges = edges.get();
        allEdges.forEach(function(edge) {
            originalEdgeColors[edge.id] = edge.color ? edge.color : undefined;
        });
    });

    network.on("selectNode", function (params) {
        var selectedNode = params.nodes[0];
        var connectedNodes = network.getConnectedNodes(selectedNode);
        var connectedEdges = network.getConnectedEdges(selectedNode);

        var allNodes = nodes.get();
        var allEdges = edges.get();

        var updateNodes = [];
        var updateEdges = [];

        // Dim all nodes except selected and its neighbors — hide their labels completely
        allNodes.forEach(function(node) {
            var isConnected = connectedNodes.includes(node.id) || node.id == selectedNode;
            if (isConnected) {
                updateNodes.push({
                    id: node.id,
                    color: originalNodeColors[node.id],
                    label: originalNodeLabels[node.id],
                    font: { color: "#3a332a" }
                });
            } else {
                updateNodes.push({
                    id: node.id,
                    color: "rgba(200,200,200,0.2)",
                    label: "",
                    font: { color: "rgba(0,0,0,0)" }
                });
            }
        });

        // Dim all edges except connected ones
        allEdges.forEach(function(edge) {
            var isConnectedEdge = connectedEdges.includes(edge.id);
            if (isConnectedEdge) {
                var restoredColor = originalEdgeColors[edge.id];
                updateEdges.push({ id: edge.id, color: restoredColor });
            } else {
                updateEdges.push({ id: edge.id, color: "rgba(200,200,200,0.1)" });
            }
        });

        nodes.update(updateNodes);
        edges.update(updateEdges);
    });

    network.on("deselectNode", function (params) {
        var allNodes = nodes.get();
        var allEdges = edges.get();
        
        var updateNodes = [];
        var updateEdges = [];

        allNodes.forEach(function(node) {
            updateNodes.push({
                id: node.id,
                color: originalNodeColors[node.id],
                label: originalNodeLabels[node.id],
                font: { color: "#3a332a" }
            });
        });
        allEdges.forEach(function(edge) {
            var restoredColor = originalEdgeColors[edge.id];
            updateEdges.push({ id: edge.id, color: restoredColor });
        });

        nodes.update(updateNodes);
        edges.update(updateEdges);
    });
    </script>

<div id="search-container">
  <input id="search-input" type="text" placeholder="🔍 Search person..." autocomplete="off" />
  <div id="search-dropdown"></div>
</div>

<div id="city-filter-bar" style="
  position: fixed;
  top: 18px;
  left: 18px;
  z-index: 9999;

  flex-direction: column;
  gap: 7px;

">
  <span style="font-size: 11px; color: #a09070; font-style: italic; margin-left: 2px;">Filter by city</span>
  <button class="cf-btn cf-active" onclick="filterByCity('all', this)">All</button>
  <button class="cf-btn" onclick="filterByCity('bologna', this)">Bologna</button>
  <button class="cf-btn" onclick="filterByCity('turin', this)">Turin</button>

<style>
.cf-btn {
  font-family: Georgia, serif;
  font-size: 13px;
  padding: 6px 16px;
  border: 1.5px solid #c4b49a;
  border-radius: 20px;
  background: rgba(250, 245, 235, 0.97);
  color: #3a332a;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 2px 8px rgba(60,50,30,0.15);
  text-align: center;
}
.cf-btn:hover {
  background: #e8dcc5;
  transform: translateY(-1px);
}
.cf-btn.cf-active {
  background: #3a332a;
  color: #f5efe3;
  border-color: #3a332a;
}
</style>

<script>
(function() {
  // Wait for vis network to be ready
  function waitForNetwork(cb) {
    if (typeof network !== 'undefined' && typeof nodes !== 'undefined') {
      cb();
    } else {
      setTimeout(function() { waitForNetwork(cb); }, 200);
    }
  }

  waitForNetwork(function() {
    var input = document.getElementById('search-input');
    var dropdown = document.getElementById('search-dropdown');
    var activeIdx = -1;

    function getAllNodes() {
      return nodes.get().map(function(n) { return { id: n.id, label: n.label || '' }; });
    }

    function highlight(text, query) {
      if (!query) return text;
      var idx = text.toLowerCase().indexOf(query.toLowerCase());
      if (idx === -1) return text;
      return text.slice(0, idx) +
        '<span class="search-highlight">' + text.slice(idx, idx + query.length) + '</span>' +
        text.slice(idx + query.length);
    }

    function focusNode(nodeId) {
      // Zoom to node
      network.focus(nodeId, { animation: { duration: 500, easingFunction: 'easeInOutQuad' } });
      network.selectNodes([nodeId]);
      // Trigger the existing selectNode behavior
      network.emit('selectNode', { nodes: [nodeId], edges: network.getConnectedEdges(nodeId) });
      // Clear search
      input.value = '';
      dropdown.style.display = 'none';
    }

    function renderDropdown(query) {
      var all = getAllNodes();
      var results = query.length === 0 ? [] : all.filter(function(n) {
        return n.label.toLowerCase().includes(query.toLowerCase());
      }).slice(0, 10);

      if (results.length === 0) {
        dropdown.style.display = 'none';
        activeIdx = -1;
        return;
      }

      dropdown.innerHTML = '';
      results.forEach(function(n, i) {
        var item = document.createElement('div');
        item.className = 'search-item';
        item.innerHTML = highlight(n.label, query);
        item.addEventListener('mousedown', function(e) {
          e.preventDefault();
          focusNode(n.id);
        });
        dropdown.appendChild(item);
      });

      dropdown.style.display = 'block';
      activeIdx = -1;
      dropdown._results = results;
    }

    input.addEventListener('input', function() {
      renderDropdown(this.value.trim());
    });

    input.addEventListener('keydown', function(e) {
      var items = dropdown.querySelectorAll('.search-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIdx = Math.min(activeIdx + 1, items.length - 1);
        items.forEach(function(el, i) { el.classList.toggle('active', i === activeIdx); });
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIdx = Math.max(activeIdx - 1, 0);
        items.forEach(function(el, i) { el.classList.toggle('active', i === activeIdx); });
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (activeIdx >= 0 && dropdown._results && dropdown._results[activeIdx]) {
          focusNode(dropdown._results[activeIdx].id);
        } else if (dropdown._results && dropdown._results.length > 0) {
          focusNode(dropdown._results[0].id);
        }
      } else if (e.key === 'Escape') {
        dropdown.style.display = 'none';
        input.blur();
      }
    });

    input.addEventListener('blur', function() {
      setTimeout(function() { dropdown.style.display = 'none'; }, 150);
    });

    input.addEventListener('focus', function() {
      if (this.value.trim()) renderDropdown(this.value.trim());
    });
  });
})();
</script>
<script>
(function() {
  function waitForNetwork(cb) {
    if (typeof network !== 'undefined' && typeof nodes !== 'undefined') {
      cb();
    } else {
      setTimeout(function() { waitForNetwork(cb); }, 200);
    }
  }

  waitForNetwork(function() {
    window.filterByCity = function(city, btn) {
      document.querySelectorAll('.cf-btn').forEach(function(b) { b.classList.remove('cf-active'); });
      btn.classList.add('cf-active');

      var allNodesList = nodes.get();
      var allEdgesList = edges.get();

      if (city === 'all') {
        nodes.update(allNodesList.map(function(n) { return { id: n.id, hidden: false }; }));
        edges.update(allEdgesList.map(function(e) { return { id: e.id, hidden: false }; }));
        return;
      }

      var visibleIds = new Set();
      allNodesList.forEach(function(n) {
        var title = (n.title || '').toLowerCase();
        var label = (n.label || '').toLowerCase();
        if (title.includes(city) || label.includes(city)) {
          visibleIds.add(n.id);
        }
      });

      nodes.update(allNodesList.map(function(n) {
        return { id: n.id, hidden: !visibleIds.has(n.id) };
      }));

      edges.update(allEdgesList.map(function(e) {
        return { id: e.id, hidden: !visibleIds.has(e.from) || !visibleIds.has(e.to) };
      }));
    };
  });
})();
</script>
</body>
